name: Benchmark (Cube)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Cube mode"
        required: true
        default: "cube"
        type: choice
        options:
          - cube
          - cube-solve
      os:
        description: "Runner OS"
        required: true
        default: "ubuntu-latest"
        type: choice
        options:
          - ubuntu-latest
          - macos-latest

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Run baseline (no cube)
        run: ./target/release/zot-cell 2>&1 | tee baseline_output.txt

      - name: Analyze baseline
        run: python3 analyze.py results.txt 2>&1 | tee baseline_analysis.txt

      - name: Save baseline results
        run: mv results.txt baseline_results.txt

      - name: Run with --${{ inputs.mode }}
        run: ./target/release/zot-cell --${{ inputs.mode }} 2>&1 | tee cube_output.txt

      - name: Analyze cube run
        run: python3 analyze.py results.txt 2>&1 | tee cube_analysis.txt

      - name: Save cube results
        run: mv results.txt cube_results.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cube-bench-${{ inputs.mode }}-${{ inputs.os }}-${{ github.run_number }}
          path: |
            baseline_results.txt
            baseline_analysis.txt
            baseline_output.txt
            cube_results.txt
            cube_analysis.txt
            cube_output.txt
            cube.csv
          retention-days: 90

      - name: Job summary
        run: |
          echo "## ZOT Cell Cube Benchmark — ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "Mode: \`--${{ inputs.mode }}\` | Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Baseline" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat baseline_analysis.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### --${{ inputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat cube_analysis.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
