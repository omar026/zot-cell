name: Security Audit

on:
  schedule:
    - cron: "0 8 * * *"  # daily 08:00 UTC
  push:
    branches: [main]
    paths: [Cargo.toml, Cargo.lock]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit
